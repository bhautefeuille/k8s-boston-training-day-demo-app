# =============================================================
# K8sGPT demo: cross-namespace DNS resolution failure
#
# Apply with:    kubectl apply -f broken-app.yaml
# Watch fail:    kubectl get pods -n broken-app -w
# Diagnose:      k8sgpt analyze --explain --filter Pod
# Clean up:      kubectl delete -f broken-app.yaml
# =============================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: cache
---
apiVersion: v1
kind: Namespace
metadata:
  name: broken-app

# -------------------------------------------------------------
# Redis lives in the `cache` namespace and works fine.
# -------------------------------------------------------------
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-master
  namespace: cache
  labels:
    app: redis-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-master
  template:
    metadata:
      labels:
        app: redis-master
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: cache
spec:
  selector:
    app: redis-master
  ports:
    - port: 6379
      targetPort: 6379

# -------------------------------------------------------------
# Checkout app in `broken-app` namespace — BROKEN.
# It points at "redis-master" (short name) which only resolves
# inside the `cache` namespace. From `broken-app` it must use the
# FQDN: redis-master.cache.svc.cluster.local
# Result: the container fails DNS, exits 1, CrashLoopBackOff.
# -------------------------------------------------------------
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  namespace: broken-app
  labels:
    app: checkout
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout
  template:
    metadata:
      labels:
        app: checkout
    spec:
      containers:
        - name: checkout
          image: busybox:1.36
          env:
            - name: CHECKOUT_REDIS_HOST
              value: "redis-master"      # <-- the bug
            - name: CHECKOUT_REDIS_PORT
              value: "6379"
          command:
            - sh
            - -c
            - |
              echo "checkout: connecting to $CHECKOUT_REDIS_HOST:$CHECKOUT_REDIS_PORT"
              if ! nc -zv -w 3 "$CHECKOUT_REDIS_HOST" "$CHECKOUT_REDIS_PORT"; then
                echo "FATAL: cannot reach Redis at $CHECKOUT_REDIS_HOST"
                exit 1
              fi
              echo "connected; running checkout..."
              sleep 3600
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
---
# A Service in broken-app, also pointing at a selector that won't
# match anything here — included so K8sGPT can flag it too.
apiVersion: v1
kind: Service
metadata:
  name: checkout
  namespace: broken-app
spec:
  selector:
    app: checkout
  ports:
    - port: 80
      targetPort: 8080